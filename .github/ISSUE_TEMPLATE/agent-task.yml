name: Agent task
description: A scoped task designed for one implementation or validation agent
title: ""
labels:
  - type:task
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: One observable outcome owned by this issue.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and file ownership
      description: Target fork, upstream base, expected files, and explicit non-goals.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Blocked by
      description: Link every hard dependency, or write None.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use a checkable list of functional and security outcomes.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Exact focused commands and required evidence.
    validations:
      required: true
  - type: textarea
    id: parallel
    attributes:
      label: Parallel notes
      description: Safe concurrent tickets, conflicting files, and integration owner.
    validations:
      required: true
  - type: checkboxes
    id: secrets
    attributes:
      label: Secret-safety gate
      options:
        - label: This work uses synthetic credentials and will not persist or expose evaluated PRF outputs.
          required: true
